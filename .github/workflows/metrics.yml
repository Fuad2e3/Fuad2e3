name: Metrics
on:
  # Schedule updates (every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Fuad2e3
          template: classic
          base: ""
          config_timezone: Asia/Dhaka
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, sass, scss, wm2, minified
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          # Display private repositories
          plugin_languages_skipped: ""
          plugin_languages_aliases: ""
          plugin_languages_colors: "0:orange, dart:teal, flutter:blue"
          
          # Commits plugin
          plugin_commits: yes
          plugin_commits_sections: detail
